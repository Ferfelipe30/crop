name: crop
description: A new Flutter project.
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: '>=3.0.6 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  image_picker: ^1.0.4
  intl: ^0.18.1
  flutter_launcher_icons: ^0.13.1
  firebase_core: ^2.20.0
  sqflite: ^2.3.0
  path: ^1.8.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets: 
    - imagen/logoApp.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "imagen/logoApp.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "path/to/logoApp.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "path/to/logoApp.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "path/to/logoApp.png"